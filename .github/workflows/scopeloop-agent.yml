name: ScopeLoop Agent Delivery
on:
  repository_dispatch:
    types: [scopeloop-delivery]
permissions:
  contents: write
  pull-requests: write
jobs:
  deliver:
    runs-on: ubuntu-latest
    env:
      SL_BRANCH: ${{ github.event.client_payload.branch }}
      SL_BASE: ${{ github.event.client_payload.baseBranch || 'main' }}
      SL_TITLE: ${{ github.event.client_payload.title }}
      SL_RUN_ID: ${{ github.event.client_payload.runId }}
      SL_MODE: ${{ github.event.client_payload.automationMode }}
      SL_API: ${{ github.event.client_payload.apiBaseUrl }}
      SL_WORK_ORDER_B64: ${{ github.event.client_payload.workOrder }}
      SL_RUN_TOKEN: ${{ secrets.SCOPELOOP_RUN_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prepare branch and work order
        run: |
          git config user.name "ScopeLoop Agent"
          git config user.email "agent@scopeloop.ai"
          git fetch origin "$SL_BRANCH" || true
          git checkout "$SL_BRANCH" 2>/dev/null || git checkout -b "$SL_BRANCH"
          mkdir -p .scopeloop
          printf '%s' "$SL_WORK_ORDER_B64" | base64 -d > .scopeloop/work-order.md
      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "Read .scopeloop/work-order.md and implement the requested change directly in this repository. Follow existing conventions and make all necessary edits." --permission-mode bypassPermissions || true
      - name: Report result, commit, and open PR
        env:
          GH_TOKEN: ${{ secrets.SCOPELOOP_GH_TOKEN }}
        run: |
          # If the agent didn't emit a result, infer one from whether it changed anything
          # (working tree edits or commits it already made on the branch).
          if [ ! -f .scopeloop/result.json ]; then
            if [ -n "$(git status --porcelain)" ] || [ "$(git rev-list --count "origin/$SL_BASE"..HEAD 2>/dev/null || echo 0)" -gt 0 ]; then
              printf '{"status":"completed","summary":"Implemented (the agent did not emit a result file)."}' > .scopeloop/result.json
            else
              printf '{"status":"blocked","summary":"The run produced no changes and no result.","blocker":"No .scopeloop/result.json and no file changes — the agent step may have errored. Check the Actions log."}' > .scopeloop/result.json
            fi
          fi
          cp .scopeloop/result.json /tmp/sl-result.json
          STATUS=$(jq -r '.status // "completed"' /tmp/sl-result.json)
          FAILED=""
          downgrade() {
            jq --arg b "$1" '.status = "blocked" | .blocker = $b' /tmp/sl-result.json > /tmp/sl-result.tmp && mv /tmp/sl-result.tmp /tmp/sl-result.json
            FAILED=1
          }
          # Never commit ScopeLoop metadata into the repo.
          rm -rf .scopeloop
          # Commit anything the agent left uncommitted.
          git add -A
          git diff --cached --quiet || git commit -m "ScopeLoop: $SL_TITLE"
          # Push whenever the branch has commits the base doesn't — the agent usually commits
          # its own work, so never gate the push on leftover uncommitted changes.
          AHEAD=$(git rev-list --count "origin/$SL_BASE"..HEAD 2>/dev/null || echo 0)
          if [ "$AHEAD" -gt 0 ]; then
            # Push as the ScopeLoop App, not the runner's default credentials: GITHUB_TOKEN can
            # NEVER push changes under .github/workflows, and agents legitimately touch CI files
            # (those changes get rated High deploy risk, so a human still gates the merge).
            PUSH_TO="origin"
            [ -n "$GH_TOKEN" ] && PUSH_TO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            if ! git push "$PUSH_TO" "HEAD:refs/heads/$SL_BRANCH"; then
              if git diff --name-only "origin/$SL_BASE"..HEAD 2>/dev/null | grep -q '^\.github/workflows/'; then
                downgrade "Could not push branch $SL_BRANCH: the change edits .github/workflows files and the ScopeLoop GitHub App is not allowed to push workflow changes to this repository. Approve the App's updated permissions on the installation, or apply the workflow edit manually."
              else
                downgrade "Could not push branch $SL_BRANCH — the work is stranded in the runner. Check the Actions log."
              fi
            fi
          elif [ "$STATUS" = "completed" ]; then
            downgrade "The agent reported completed but produced no commits on the branch."
          fi
          # Open the PR before reporting, so a PR failure reaches ScopeLoop too.
          if [ "$STATUS" = "completed" ] && [ -z "$FAILED" ]; then
            gh pr view "$SL_BRANCH" >/dev/null 2>&1 || \
              gh pr create --title "ScopeLoop: $SL_TITLE" --body "Automated delivery run $SL_RUN_ID from ScopeLoop." --base "$SL_BASE" --head "$SL_BRANCH" || \
              downgrade "The branch was pushed but the pull request could not be created. Check the Actions log."
          fi
          # Report the structured result back to ScopeLoop.
          if [ -n "$SL_API" ] && [ -n "$SL_RUN_TOKEN" ]; then
            curl -s -X POST "$SL_API/api/pipeline/runs/$SL_RUN_ID/result" \
              -H "X-ScopeLoop-Token: $SL_RUN_TOKEN" -H "Content-Type: application/json" \
              --data @/tmp/sl-result.json || true
          fi
          # A swallowed failure must still fail the job loudly.
          [ -z "$FAILED" ] || exit 1