name: ScopeLoop Agent Delivery
on:
  repository_dispatch:
    types: [scopeloop-delivery]
permissions:
  contents: write
  pull-requests: write
jobs:
  deliver:
    runs-on: ubuntu-latest
    env:
      SL_BRANCH: ${{ github.event.client_payload.branch }}
      SL_TITLE: ${{ github.event.client_payload.title }}
      SL_RUN_ID: ${{ github.event.client_payload.runId }}
      SL_MODE: ${{ github.event.client_payload.automationMode }}
      SL_API: ${{ github.event.client_payload.apiBaseUrl }}
      SL_WORK_ORDER_B64: ${{ github.event.client_payload.workOrder }}
      SL_RUN_TOKEN: ${{ secrets.SCOPELOOP_RUN_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prepare branch and work order
        run: |
          git config user.name "ScopeLoop Agent"
          git config user.email "agent@scopeloop.ai"
          git fetch origin "$SL_BRANCH" || true
          git checkout "$SL_BRANCH" 2>/dev/null || git checkout -b "$SL_BRANCH"
          mkdir -p .scopeloop
          printf '%s' "$SL_WORK_ORDER_B64" | base64 -d > .scopeloop/work-order.md
      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "Read .scopeloop/work-order.md and implement the requested change directly in this repository. Follow existing conventions and make all necessary edits." --permission-mode bypassPermissions || true
      - name: Report result, commit, and open PR
        env:
          GH_TOKEN: ${{ secrets.SCOPELOOP_GH_TOKEN }}
        run: |
          # If the agent didn't emit a result, infer one from whether it changed anything.
          if [ ! -f .scopeloop/result.json ]; then
            if [ -n "$(git status --porcelain)" ]; then
              printf '{"status":"completed","summary":"Implemented (the agent did not emit a result file)."}' > .scopeloop/result.json
            else
              printf '{"status":"blocked","summary":"The run produced no changes and no result.","blocker":"No .scopeloop/result.json and no file changes — the agent step may have errored. Check the Actions log."}' > .scopeloop/result.json
            fi
          fi
          cp .scopeloop/result.json /tmp/sl-result.json
          STATUS=$(jq -r '.status // "completed"' /tmp/sl-result.json)
          # Never commit ScopeLoop metadata into the repo.
          rm -rf .scopeloop
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "ScopeLoop: $SL_TITLE"
            git push origin "$SL_BRANCH" || true
          fi
          # Report the structured result back to ScopeLoop (best-effort).
          if [ -n "$SL_API" ] && [ -n "$SL_RUN_TOKEN" ]; then
            curl -s -X POST "$SL_API/api/pipeline/runs/$SL_RUN_ID/result" \
              -H "X-ScopeLoop-Token: $SL_RUN_TOKEN" -H "Content-Type: application/json" \
              --data @/tmp/sl-result.json || true
          fi
          # Open a PR only once the agent says it's done.
          if [ "$STATUS" = "completed" ]; then
            gh pr view "$SL_BRANCH" >/dev/null 2>&1 || \
              gh pr create --title "ScopeLoop: $SL_TITLE" --body "Automated delivery run $SL_RUN_ID from ScopeLoop." --head "$SL_BRANCH" || true
          fi